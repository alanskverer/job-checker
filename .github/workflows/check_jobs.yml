name: Daily Job Checker

on:
  schedule:
    # 6:00 UTC = 8:00 Israel Standard Time (UTC+2) / 9:00 Israel Daylight Time (UTC+3)
    - cron: "0 6 * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI
  push:
    branches: [master]

jobs:
  check-jobs:
    runs-on: ubuntu-latest

    permissions:
      contents: write # needed to commit seen_jobs.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job checker
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python job_checker.py

      - name: Commit updated seen_jobs.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_jobs.json
          git diff --staged --quiet || git commit -m "chore: update seen_jobs.json [skip ci]"
          git push
